name: SecondBrain
options:
  bundleIdPrefix: com.secondbrain
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

packages:
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit
    from: "0.9.0"
  swift-collections:
    url: https://github.com/apple/swift-collections.git
    from: "1.4.0"

targets:
  SecondBrain:
    type: application
    platform: iOS
    sources:
      - SecondBrain
    settings:
      base:
        INFOPLIST_FILE: SecondBrain/Info.plist
        SWIFT_EMIT_MODULE_INTERFACE: false
        PRODUCT_BUNDLE_IDENTIFIER: com.karthikshashidhar.secondbrain
        DEVELOPMENT_TEAM: 6APL9VM8C3
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - package: WhisperKit
      - package: swift-collections
        product: OrderedCollections
