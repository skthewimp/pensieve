name: Pensieve
options:
  bundleIdPrefix: com.karthikshashidhar
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

packages:
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit
    from: "0.9.0"

targets:
  Pensieve:
    type: application
    platform: iOS
    sources:
      - Pensieve
    settings:
      base:
        INFOPLIST_FILE: Pensieve/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.karthikshashidhar.pensieve
        DEVELOPMENT_TEAM: DQ23J9RMB2
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - package: WhisperKit
